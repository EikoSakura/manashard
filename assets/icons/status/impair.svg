<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6b7280" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6b7280" stop-opacity="0.08"/>
    </radialGradient>
    <linearGradient id="swordGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9ca3af"/>
      <stop offset="100%" stop-color="#6b7280"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#6b7280" stroke-width="10" stroke-opacity="0.7"/>
  <!-- Sword blade - left half (broken) -->
  <path d="M220 100 L240 100 L240 250 L220 250 Z"
        fill="url(#swordGrad)" fill-opacity="0.4" stroke="#6b7280" stroke-width="10" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Sword tip (pointed) -->
  <path d="M220 100 L230 60 L240 100" fill="url(#swordGrad)" fill-opacity="0.4" stroke="#6b7280" stroke-width="10" stroke-linejoin="round"/>
  <!-- Sword guard -->
  <rect x="195" y="250" width="70" height="18" rx="4" fill="url(#swordGrad)" fill-opacity="0.5" stroke="#6b7280" stroke-width="8"/>
  <!-- Sword handle -->
  <rect x="222" y="268" width="16" height="60" rx="3" fill="url(#swordGrad)" fill-opacity="0.4" stroke="#6b7280" stroke-width="8"/>
  <!-- Pommel -->
  <circle cx="230" cy="340" r="14" fill="url(#swordGrad)" fill-opacity="0.4" stroke="#6b7280" stroke-width="8"/>
  <!-- Break/crack across blade -->
  <path d="M215 190 L245 180" fill="none" stroke="white" stroke-width="8" stroke-opacity="0.8" stroke-linecap="round"/>
  <path d="M215 190 L210 200 L218 210" fill="none" stroke="white" stroke-width="5" stroke-opacity="0.5" stroke-linecap="round"/>
  <!-- Broken shard flying away -->
  <path d="M280 140 L300 120 L310 160 L290 150 Z"
        fill="#6b7280" fill-opacity="0.4" stroke="#6b7280" stroke-width="6" stroke-linejoin="round" transform="rotate(15,295,140)"/>
  <path d="M320 170 L335 155 L340 180 Z"
        fill="#6b7280" fill-opacity="0.3" stroke="#6b7280" stroke-width="4" stroke-linejoin="round"/>
  <!-- Large downward arrow -->
  <path d="M340 280 L390 280 L365 360 Z"
        fill="#6b7280" fill-opacity="0.5" stroke="#6b7280" stroke-width="10" stroke-linejoin="round" filter="url(#glow)"/>
  <rect x="355" y="210" width="20" height="75" rx="4" fill="#6b7280" fill-opacity="0.45" stroke="#6b7280" stroke-width="8"/>
  <!-- White highlight on blade -->
  <path d="M228 110 L228 170" fill="none" stroke="white" stroke-width="5" stroke-opacity="0.35" stroke-linecap="round"/>
  <!-- Sparkles at break point -->
  <circle cx="250" cy="185" r="5" fill="white" fill-opacity="0.5"/>
  <circle cx="265" cy="195" r="3" fill="white" fill-opacity="0.4"/>
</svg>