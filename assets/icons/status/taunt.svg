<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e06010" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e06010" stop-opacity="0.08"/>
    </radialGradient>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#e06010"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#e06010" stroke-width="10" stroke-opacity="0.7"/>
  <!-- Shield shape -->
  <path d="M256 60 L400 135 L400 300 C400 385 256 460 256 460 C256 460 112 385 112 300 L112 135 Z"
        fill="url(#shieldGrad)" fill-opacity="0.3" stroke="#e06010" stroke-width="14" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- White highlight on shield -->
  <path d="M175 160 L185 145 L195 170" fill="none" stroke="white" stroke-width="7" stroke-opacity="0.35" stroke-linecap="round"/>
  <!-- Shield inner border -->
  <path d="M256 105 L365 160 L365 285 C365 350 256 415 256 415 C256 415 147 350 147 285 L147 160 Z"
        fill="none" stroke="white" stroke-width="5" stroke-opacity="0.2" stroke-linejoin="round"/>
  <!-- Exclamation mark - bold and prominent -->
  <rect x="234" y="150" width="44" height="170" rx="22" fill="#e06010" fill-opacity="0.7" stroke="white" stroke-width="6" stroke-opacity="0.6"/>
  <circle cx="256" cy="385" r="26" fill="#e06010" fill-opacity="0.7" stroke="white" stroke-width="6" stroke-opacity="0.6"/>
  <!-- Inner white of exclamation -->
  <rect x="246" y="165" width="20" height="140" rx="10" fill="white" fill-opacity="0.5"/>
  <circle cx="256" cy="385" r="12" fill="white" fill-opacity="0.5"/>
  <!-- Radiating aggro lines -->
  <line x1="70" y1="180" x2="100" y2="200" stroke="#e06010" stroke-width="8" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="60" y1="256" x2="95" y2="256" stroke="#e06010" stroke-width="8" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="70" y1="330" x2="100" y2="310" stroke="#e06010" stroke-width="7" stroke-opacity="0.4" stroke-linecap="round"/>
  <line x1="442" y1="180" x2="412" y2="200" stroke="#e06010" stroke-width="8" stroke-opacity="0.5" stroke-linecap="round"/>
  <line x1="452" y1="256" x2="417" y2="256" stroke="#e06010" stroke-width="8" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="442" y1="330" x2="412" y2="310" stroke="#e06010" stroke-width="7" stroke-opacity="0.4" stroke-linecap="round"/>
  <!-- Anger sparkles -->
  <circle cx="95" cy="120" r="6" fill="#f59e0b" fill-opacity="0.5"/>
  <circle cx="417" cy="120" r="5" fill="#f59e0b" fill-opacity="0.45"/>
  <circle cx="80" cy="390" r="5" fill="#f59e0b" fill-opacity="0.35"/>
  <circle cx="432" cy="390" r="4" fill="#f59e0b" fill-opacity="0.3"/>
</svg>