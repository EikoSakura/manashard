<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82c8" stop-opacity="0.08"/>
    </radialGradient>
    <linearGradient id="crystalGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="50%" stop-color="#3b82c8"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="facetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b82c8" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#3b82c8" stroke-width="10" stroke-opacity="0.7"/>
  <!-- Main crystal formation - large hexagonal gem -->
  <path d="M256 55 L370 140 L390 290 L310 440 L200 440 L120 290 L140 140 Z"
        fill="url(#crystalGrad)" fill-opacity="0.35" stroke="#3b82c8" stroke-width="12" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Crystal facet lines -->
  <path d="M256 55 L256 440" fill="none" stroke="white" stroke-width="4" stroke-opacity="0.25"/>
  <path d="M256 55 L120 290" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.2"/>
  <path d="M256 55 L390 290" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.2"/>
  <path d="M140 140 L310 440" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.15"/>
  <path d="M370 140 L200 440" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.15"/>
  <!-- Bright facet highlight -->
  <path d="M256 55 L370 140 L256 250 Z" fill="url(#facetGrad)"/>
  <!-- Figure silhouette trapped inside -->
  <!-- Head -->
  <circle cx="256" cy="175" r="28" fill="#1e3a5f" fill-opacity="0.5" stroke="#3b82c8" stroke-width="4" stroke-opacity="0.6"/>
  <!-- Body -->
  <path d="M256 203 L256 310" stroke="#3b82c8" stroke-width="10" stroke-opacity="0.5" stroke-linecap="round"/>
  <!-- Arms reaching out -->
  <path d="M256 240 L200 210" stroke="#3b82c8" stroke-width="8" stroke-opacity="0.45" stroke-linecap="round"/>
  <path d="M256 240 L312 210" stroke="#3b82c8" stroke-width="8" stroke-opacity="0.45" stroke-linecap="round"/>
  <!-- Legs -->
  <path d="M256 310 L220 380" stroke="#3b82c8" stroke-width="8" stroke-opacity="0.45" stroke-linecap="round"/>
  <path d="M256 310 L292 380" stroke="#3b82c8" stroke-width="8" stroke-opacity="0.45" stroke-linecap="round"/>
  <!-- White highlight streak -->
  <path d="M185 160 L195 140 L205 170" fill="none" stroke="white" stroke-width="7" stroke-opacity="0.45" stroke-linecap="round"/>
  <!-- Radiating crystal shards -->
  <polygon points="85,150 95,120 115,155" fill="#7dd3fc" fill-opacity="0.4" stroke="#3b82c8" stroke-width="4" stroke-opacity="0.5"/>
  <polygon points="410,170 425,140 430,175" fill="#7dd3fc" fill-opacity="0.35" stroke="#3b82c8" stroke-width="3" stroke-opacity="0.45"/>
  <polygon points="90,350 105,330 110,365" fill="#7dd3fc" fill-opacity="0.3" stroke="#3b82c8" stroke-width="3" stroke-opacity="0.4"/>
  <polygon points="405,330 415,310 425,345" fill="#7dd3fc" fill-opacity="0.3" stroke="#3b82c8" stroke-width="3" stroke-opacity="0.4"/>
  <!-- Sparkle accents -->
  <circle cx="310" cy="120" r="6" fill="white" fill-opacity="0.6"/>
  <circle cx="155" cy="260" r="5" fill="white" fill-opacity="0.4"/>
  <circle cx="365" cy="280" r="4" fill="white" fill-opacity="0.35"/>
  <circle cx="230" cy="430" r="5" fill="white" fill-opacity="0.3"/>
</svg>