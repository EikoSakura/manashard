  <!-- Arms drooping down -->
  <line x1="128" y1="120" x2="85" y2="155" stroke="#cc8844" stroke-width="7" stroke-linecap="round"/>
  <line x1="128" y1="120" x2="171" y2="155" stroke="#cc8844" stroke-width="7" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="128" y1="165" x2="95" y2="210" stroke="#cc8844" stroke-width="7" stroke-linecap="round"/>
  <line x1="128" y1="165" x2="161" y2="210" stroke="#cc8844" stroke-width="7" stroke-linecap="round"/>
